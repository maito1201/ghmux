name: Release

# タグ (vX.Y.Z) を push するとアプリをビルドし、成果物 (tar.gz) を
# GitHub Release に添付して配布する。
# workflow_dispatch でも実行でき、その場合はタグを打つ前に
# ビルド成否を確認できるよう成果物を Actions のアーティファクトとして上げる。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Release 作成にはリポジトリへの書き込み権限が必要。
permissions:
  contents: write

jobs:
  build-release:
    # macos-15 (arm64) を使う。理由: Zig 0.15.2 が公式サポートする正常な MacOSX15.sdk
    # が存在し、macOS 26 SDK の libSystem.tbd が arm64-macos を欠く問題が発生しない。
    # (macos-26 ランナーは Xcode/CLT とも macOS 26 SDK しか無く、Zig 0.15.2 のリンクが
    #  失敗する。ローカルの CLT-SDK 回避ラッパーも逃がし先が同問題のため効かない。)
    # patch-zig の host クランプは host<16 で no-op、patch-ghostty は SDK 非依存で有効。
    # GhosttyKit.xcframework は macos-arm64 スライスのみ → arm64 ランナーが必須。
    runs-on: macos-15

    steps:
      - name: Checkout (submodule 込み)
        uses: actions/checkout@v4
        with:
          # vendor/ghostty submodule (公開 URL) を取得。libghostty のソース。
          submodules: recursive

      - name: Xcode を選択
        run: |
          # build-libghostty.sh は Metal シェーダコンパイラのため DEVELOPER_DIR を
          # Xcode.app に向ける必要がある。
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          echo "DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer" >> "$GITHUB_ENV"
          xcodebuild -version
          swift --version

      - name: Metal Toolchain を確保
        run: |
          # libghostty のシェーダビルドに metal コンパイラが必要。
          # Xcode 16+ では別コンポーネント扱いのため、未導入なら取得を試みる。
          if ! xcrun --find metal >/dev/null 2>&1; then
            xcodebuild -downloadComponent MetalToolchain || true
          fi
          xcrun --find metal || echo "metal が見つかりません (build-libghostty で失敗する可能性)"

      - name: Zig 0.15.2 を導入
        run: ./scripts/install-zig.sh

      - name: ビルドパッチを適用
        run: |
          # 両スクリプトとも冪等 (適用済みマーカーを検出すると何もしない)。
          ./scripts/patch-zig.sh
          ./scripts/patch-ghostty.sh

      - name: libghostty (GhosttyKit.xcframework) をビルド
        run: ./scripts/build-libghostty.sh

      - name: ghmux をリリースビルド
        run: swift build -c release --product ghmux

      - name: ghmux.app を組み立てて .dmg にパッケージ
        run: |
          set -euo pipefail
          BIN="$(swift build -c release --show-bin-path)"
          # タグ (vX.Y.Z) なら v を外したバージョン、手動実行時は 0.0.0-dev。
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          STAGE="ghmux-${GITHUB_REF_NAME}-macos-arm64"
          APP="dist/stage/ghmux.app"

          # .app バンドルを組み立てる。LaunchServices が単独起動する標準構成。
          mkdir -p "${APP}/Contents/MacOS" "${APP}/Contents/Resources"
          cp "${BIN}/ghmux" "${APP}/Contents/MacOS/ghmux"
          # Info.plist の __VERSION__ を実バージョンへ置換して配置。
          sed "s/__VERSION__/${VERSION}/g" Packaging/Info.plist > "${APP}/Contents/Info.plist"
          # リソース root (配下に ghostty/ と terminfo/)。Contents/Resources に埋め込み、
          # Ghostty.App が Bundle.main.resourcePath/ghostty-resources として発見する。
          if [ -d Vendored/ghostty-resources ]; then
            cp -R Vendored/ghostty-resources "${APP}/Contents/Resources/ghostty-resources"
          else
            echo "ghostty-resources 未生成 — terminfo 同梱をスキップ (pane 内端末が degrade する)"
          fi

          # ドラッグインストール体験のため /Applications シンボリックリンクを同梱。
          ln -s /Applications dist/stage/Applications
          hdiutil create -volname ghmux -srcfolder dist/stage -ov -format UDZO "dist/${STAGE}.dmg"
          # ダウンロード後に `shasum -c` が通るよう、dist/ 内で実行してベース名のみ記録する。
          ( cd dist && shasum -a 256 "${STAGE}.dmg" | tee "${STAGE}.dmg.sha256" )
          echo "STAGE=${STAGE}" >> "$GITHUB_ENV"

      - name: アーティファクトをアップロード (手動実行時の検証用)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGE }}
          path: dist/*.dmg

      - name: GitHub Release を作成 (タグ push 時)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.sha256
          generate_release_notes: true
          append_body: true
          body: |
            ### インストール

            1. `.dmg` を開き、`ghmux.app` を Applications へドラッグする。
            2. 未署名のため、初回のみ Gatekeeper の隔離属性を解除する:

            ```sh
            xattr -dr com.apple.quarantine /Applications/ghmux.app
            ```

            3. `ghmux.app` を起動する (Launchpad / `open -a ghmux`)。
          fail_on_unmatched_files: true
